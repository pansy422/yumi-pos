name: Build Yumi POS (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.electron-cache
      GYP_MSVS_VERSION: '2022'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools (provides distutils for newer Python)
        run: python -m pip install --upgrade pip setuptools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Rebuild native modules for Electron
        run: npm run rebuild
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Build renderer + main
        run: npm run build

      - name: Package Windows installer + portable
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yumi-pos-windows
          path: |
            release/*Setup*.exe
            release/*Portable*.exe
          if-no-files-found: error

      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*Setup*.exe
            release/*Portable*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
